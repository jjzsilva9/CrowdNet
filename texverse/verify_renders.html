<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>TexVerse Render Verification</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, system-ui, sans-serif; background: #1a1a2e; color: #eee; padding: 16px; }
#header { margin-bottom: 16px; display: flex; align-items: center; gap: 16px; flex-wrap: wrap; }
h1 { font-size: 18px; }
#stats { font-size: 13px; color: #aaa; }
#stats .ok { color: #2ecc71; }
#stats .flagged { color: #e74c3c; }
#controls { display: flex; gap: 8px; flex-wrap: wrap; }
#controls input { padding: 6px 10px; background: #0f0f23; border: 1px solid #333; color: #eee; border-radius: 4px; font-size: 13px; width: 250px; }
#controls button { padding: 6px 12px; border: none; border-radius: 4px; cursor: pointer; font-size: 13px; font-weight: 600; }
#btn-export { background: #2ecc71; color: #fff; }
#btn-show-flagged { background: #e74c3c; color: #fff; }
#btn-show-all { background: #555; color: #fff; }
#grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(440px, 1fr)); gap: 10px; }
.card { background: #16213e; border-radius: 6px; overflow: hidden; cursor: pointer; border: 2px solid transparent; transition: border-color 0.1s; }
.card:hover { border-color: #555; }
.card.ok { border-color: #2ecc71; }
.card.flagged { border-color: #e74c3c; }
.card .images { display: grid; grid-template-columns: 1fr 1fr; }
.card img { width: 100%; height: 180px; object-fit: contain; background: #0f0f23; display: block; }
.card .img-label { font-size: 10px; color: #555; text-align: center; padding: 2px 0; background: #0f0f23; }
.card .info { padding: 6px 8px; }
.card .uid { font-family: monospace; font-size: 10px; color: #555; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.card .kw { font-size: 11px; color: #aaa; margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.card .snippet { font-size: 11px; color: #777; margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.card .badge { display: inline-block; padding: 1px 6px; border-radius: 3px; font-size: 10px; font-weight: 700; margin-top: 4px; }
.badge-ok { background: #2ecc71; color: #fff; }
.badge-flagged { background: #e74c3c; color: #fff; }
.badge-unseen { background: #555; color: #aaa; }
#keyboard-hint { font-size: 11px; color: #555; margin-top: 4px; }
</style>
</head>

</div>

e jacket features long sleeves extending outward, a high collar at"}, {"uid": "ffd74d38ca624b1e80d70199eca884ca", "keywords": ["shirt", "t-shirt", "pants", "outfit"], "category": ["bottom", "one-piece", "top"], "snippet": "A casual outfit consisting of a t-shirt, cargo pants, and sneakers. The t-shirt is positioned above the pants, and the c"}];
const STORAGE_KEY = 'texverse_render_verify_v1';

let decisions = {};
let hoveredUid = null;

function load() {
  try { decisions = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}'); } catch(e) {}
}

function save() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(decisions));
}

function getDecision(uid) {
  return decisions[uid] || 'unseen';
}

function setDecision(uid, val) {
  decisions[uid] = val;
  save();
  renderCard(uid);
  updateStats();
}

function toggleFlag(uid) {
  const cur = getDecision(uid);
  setDecision(uid, cur === 'flagged' ? 'ok' : 'flagged');
}

const cardEls = {};

function renderCard(uid) {
  const el = cardEls[uid];
  if (!el) return;
  const d = getDecision(uid);
  el.className = 'card ' + d;
  el.querySelector('.badge').className = 'badge badge-' + d;
  el.querySelector('.badge').textContent = d === 'unseen' ? '?' : d === 'ok' ? '✓ OK' : '✗ FLAG';
}

function updateStats() {
  const total = MODELS.length;
  const ok = Object.values(decisions).filter(v => v === 'ok').length;
  const flagged = Object.values(decisions).filter(v => v === 'flagged').length;
  document.getElementById('stat-total').textContent = `${total} models (${total - ok - flagged} unseen)`;
  document.getElementById('stat-ok').textContent = `${ok} accepted`;
  document.getElementById('stat-flagged').textContent = `${flagged} flagged`;
}

function build() {
  const grid = document.getElementById('grid');
  MODELS.forEach(m => {
    const el = document.createElement('div');
    el.className = 'card unseen';
    el.dataset.uid = m.uid;
    el.dataset.search = (m.uid + ' ' + m.keywords.join(' ') + ' ' + m.snippet).toLowerCase();
    el.innerHTML = `
      <div class="images">
        <div>
          <img src="renders/${m.uid}/0.png" loading="lazy" alt="${m.uid}" />
          <div class="img-label">Albedo</div>
        </div>
        <div>
          <img src="renders/${m.uid}/0_mr.png" loading="lazy" alt="${m.uid} MR" />
          <div class="img-label">Metallic-Roughness</div>
        </div>
      </div>
      <div class="info">
        <div class="uid">${m.uid}</div>
        <div class="kw">${m.keywords.join(', ')}</div>
        <div class="snippet">${m.snippet}</div>
        <span class="badge badge-unseen">?</span>
      </div>
    `;
    el.addEventListener('click', () => toggleFlag(m.uid));
    el.addEventListener('mouseenter', () => hoveredUid = m.uid);
    el.addEventListener('mouseleave', () => hoveredUid = null);
    cardEls[m.uid] = el;
    grid.appendChild(el);
    renderCard(m.uid);
  });
}

function filterCards(q) {
  const query = q.toLowerCase();
  Object.entries(cardEls).forEach(([uid, el]) => {
    el.style.display = el.dataset.search.includes(query) ? '' : 'none';
  });
}

function showFlagged() {
  Object.entries(cardEls).forEach(([uid, el]) => {
    el.style.display = getDecision(uid) === 'flagged' ? '' : 'none';
  });
}

function showAll() {
  Object.values(cardEls).forEach(el => el.style.display = '');
}

function exportFlagged() {
  const flagged = Object.entries(decisions).filter(([_, v]) => v === 'flagged').map(([k]) => k);
  const text = flagged.join('\n');
  const blob = new Blob([text], { type: 'text/plain' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'flagged_renders.txt';
  a.click();
}

document.addEventListener('keydown', e => {
  if (!hoveredUid) return;
  if (e.key === 'a' || e.key === 'A') setDecision(hoveredUid, 'ok');
  else if (e.key === 'f' || e.key === 'F') setDecision(hoveredUid, 'flagged');
});

load();
build();
updateStats();
</script>

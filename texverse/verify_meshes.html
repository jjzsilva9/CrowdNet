const grid = document.getElementById('grid');
const cards = [];

MODELS.forEach(m => {
  const card = document.createElement('div');
  card.className = 'card' + (m.missing ? ' missing' : '');
  card.dataset.searchtext = (m.model_id + ' ' + m.name + ' ' + m.matched_keywords.join(' ')).toLowerCase();

  card.innerHTML = `
    ${m.missing ? '' : `<model-viewer src="glbs/${m.model_id}.glb" auto-rotate camera-controls shadow-intensity="1" environment-image="neutral" loading="lazy"></model-viewer>`}
    <div class="info">
      <div class="name">${m.name || 'Unnamed'}</div>
      <div class="meta">${m.resolution} · ${m.vertexCount?.toLocaleString() || '?'} verts · ${m.faceCount?.toLocaleString() || '?'} faces · PBR: ${m.pbrType || 'none'}</div>
      <div class="keywords">${m.matched_keywords.map(k => `<span class="kw">${k}</span>`).join('')}</div>
      <div class="id">${m.model_id}</div>
    </div>
  `;
  grid.appendChild(card);
  cards.push(card);
});

document.getElementById('summary').textContent = `${MODELS.length} models · ${MODELS.filter(m => !m.missing).length} GLBs found · ${MODELS.filter(m => m.missing).length} missing`;

function filterCards(query) {
  const q = query.toLowerCase();
  cards.forEach(c => {
    c.style.display = c.dataset.searchtext.includes(q) ? '' : 'none';
  });
}
